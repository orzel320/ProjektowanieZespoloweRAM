version: "3.9"

services:
  ai-service:
    build: ./ai-service
    container_name: ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3001:3001"
    depends_on:
      - ai-service
    environment:
      AI_SERVICE_URL: http://ai-service:8000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      PROJECT_API_KEY: ${PROJECT_API_KEY}
    restart: unless-stopped